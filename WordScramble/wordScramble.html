<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Word Scramble Game ni Hazel</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
 
     <audio autoplay loop id="bg-music">
  <source src="bg-music.mp3" type="audio/mpeg">  
</audio>
<p>Music </p>
<button onclick="document.getElementById('bg-music').play()">Play</button>
<button onclick="document.getElementById('bg-music').pause()">Pause</button>

<!-- Volume Range Slider -->
<label for="volumeSlider">Volume:</label>
<input 
  type="range" 
  id="volumeSlider" 
  min="0" 
  max="1" 
  step="0.01" 
  value="1" 
  oninput="adjustVolume(this.value)"
>
    <script>
  function adjustVolume(val) {
    const audio = document.getElementById("bg-music");
    audio.volume = val;
  }
    </script>

    <script  src="./script.js"></script>

  </body>
  
</html>
